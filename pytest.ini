[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
addopts =
    --strict-markers
    -v
    --tb=short
markers =
    slow: long-running tests (load real xlsx, train ML, dst.)
    integration: integration test multi-module
    dashboard: dashboard-specific tests (require streamlit)
    gdrive_live: tests that hit real Google Drive API (skip by default)
